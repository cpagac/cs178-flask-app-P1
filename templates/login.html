<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - Turing Test Game</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} mb-0">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="mb-3">Enter the Arena</h2>
                        <p class="text-muted">Choose a username to begin. No password required.</p>
                        <form method="POST" action="{{ url_for('login') }}">
                            <div class="form-group">
                                <label for="username">Username</label>
                                <input type="text" id="username" name="username" class="form-control" maxlength="50" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">Start Playing</button>
                        </form>
                        <a href="{{ url_for('home') }}" class="btn btn-link btn-sm mt-2">Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
